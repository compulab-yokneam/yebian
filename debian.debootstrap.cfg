#!/bin/bash

declare -A ARRAYNAME=( [name]="buster bullseye sid bionic focal groovy" [variant]="buildd minbase" [arch]="arm64 armhf" )

MACHINE=${MACHINE:-generic}
CFG=${CFG:-/tmp/${MACHINE}_debian.debootstrap.inc}
cat << EOG
--- Debootstrap Configuration started ---
conf file : [ ${CFG} ]
EOG
for ARRAY in ${!ARRAYNAME[@]}; do

    select_string=${ARRAYNAME[${ARRAY}]}
    PS3="${ARRAY} configuration (Ctrl^C -- exit) : "
    select i in $select_string; do
        [[ -z ${i} ]] && echo "Invalid option -(" || case $i in
        default)
        break
        ;;
        *)
        ARRAYNAME[${ARRAY}]=${i}
        break
        ;;
        esac
    done # select

done

: > ${CFG}
for ARRAY in ${!ARRAYNAME[@]}; do
cat << eof >> ${CFG}
${ARRAY}=${ARRAYNAME[${ARRAY}]}
eof
done

cat << EOG
--- Debootstrap Configuration created ---
conf file : [ ${CFG} ]
EOG
